<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitPulse</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #1c2230;
      --border: #2d3340;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #f78166;
      --accent-dim: #6e3b2e;
      --green: #3fb950;
      --red: #f85149;
      --blue: #58a6ff;
      --yellow: #d29922;
      --mono: ui-monospace, "SF Mono", "Cascadia Code", "Fira Code", monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    [data-theme="light"] {
      --bg: #f6f8fa;
      --panel: #fff;
      --panel-2: #f0f3f6;
      --border: #d0d7de;
      --text: #1f2328;
      --muted: #656d76;
      --accent: #d4471f;
      --accent-dim: #f3c9bc;
      --green: #1a7f37;
      --red: #cf222e;
      --blue: #0969da;
      --yellow: #9a6700;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      height: 100vh;
      overflow: hidden
    }

    .app {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: 100vh
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto
    }

    .brand {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px
    }

    .brand h1 {
      font-family: var(--mono);
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -.3px
    }

    .brand .pulse {
      color: var(--accent)
    }

    .brand-ctl {
      display: flex;
      gap: 6px;
      align-items: center
    }

    .mini {
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px
    }

    .mini:hover {
      color: var(--text)
    }

    select.uilang {
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 3px 5px;
      font-size: 11px;
      width: auto
    }

    .side-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border)
    }

    .side-section h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .source-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 10px
    }

    .source-tab {
      flex: 1;
      padding: 5px;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted)
    }

    .source-tab.active {
      color: var(--text);
      border-color: var(--accent)
    }

    input,
    select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 7px 9px;
      font-size: 13px;
      font-family: var(--sans)
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--accent)
    }

    input.path {
      font-family: var(--mono);
      font-size: 12px
    }

    .field {
      margin-bottom: 9px
    }

    .field label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 3px
    }

    .row {
      display: flex;
      gap: 7px
    }

    .row>input {
      flex: 1
    }

    button.btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%
    }

    button.btn:hover {
      filter: brightness(1.08)
    }

    button.btn.ghost {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border)
    }

    button.btn.sm {
      padding: 6px 10px;
      font-size: 12px;
      width: auto
    }

    .browse-btn {
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap
    }

    .browse-btn:hover {
      color: var(--text)
    }

    .repo-mem {
      list-style: none
    }

    .repo-mem li {
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted)
    }

    .repo-mem li:hover {
      background: var(--panel-2);
      color: var(--text)
    }

    .repo-mem .tag {
      font-family: var(--mono);
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 4px;
      background: var(--accent-dim);
      color: var(--accent)
    }

    .repo-mem .nm {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1
    }

    .repo-mem .x {
      opacity: 0
    }

    .repo-mem li:hover .x {
      opacity: 1
    }

    /* provider status pills in sidebar */
    .prov-line {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      padding: 4px 0;
      cursor: pointer
    }

    .dot-s {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .dot-s.on {
      background: var(--green)
    }

    .dot-s.off {
      background: var(--red)
    }

    .prov-line .pn {
      flex: 1
    }

    .prov-line .pd {
      color: var(--muted);
      font-size: 11px
    }

    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .actionbar {
      display: flex;
      gap: 2px;
      padding: 0 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      overflow-x: auto
    }

    .action {
      padding: 13px 14px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      white-space: nowrap
    }

    .action:hover {
      color: var(--text)
    }

    .action.active {
      color: var(--text);
      border-bottom-color: var(--accent)
    }

    .controls {
      padding: 12px 18px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 14px;
      align-items: flex-end;
      flex-wrap: wrap
    }

    .controls .field {
      margin: 0;
      min-width: 120px
    }

    .controls .go {
      min-width: 120px
    }

    .output {
      flex: 1;
      overflow-y: auto;
      padding: 22px 26px
    }

    .placeholder {
      color: var(--muted);
      text-align: center;
      margin-top: 80px;
      font-size: 15px
    }

    .placeholder code {
      font-family: var(--mono);
      color: var(--accent)
    }

    .banner {
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 13px;
      display: flex;
      gap: 10px;
      align-items: center
    }

    .banner.warn {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--text)
    }

    .banner.info {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--muted)
    }

    .banner .b-act {
      margin-left: auto;
      display: flex;
      gap: 8px
    }

    .head-card {
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      background: var(--panel);
      border-radius: 8px;
      padding: 16px 18px;
      margin-bottom: 18px
    }

    .head-card .title {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted)
    }

    .head-card .headline {
      font-size: 17px;
      font-weight: 600;
      margin: 6px 0 12px
    }

    .stats {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 13px
    }

    .stats .n {
      font-weight: 700
    }

    .add {
      color: var(--green)
    }

    .del {
      color: var(--red)
    }

    .heat {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 34px;
      margin-top: 14px
    }

    .heat .bar {
      flex: 1;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
      min-height: 2px;
      opacity: .85
    }

    .heat-label {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 4px
    }

    .block {
      margin-bottom: 20px
    }

    .block h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      margin-bottom: 10px
    }

    .overview {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      line-height: 1.65
    }

    .theme {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 16px;
      margin-bottom: 10px;
      background: var(--panel)
    }

    .theme .t {
      font-weight: 600;
      color: var(--blue);
      margin-bottom: 5px
    }

    .theme .narr {
      line-height: 1.6
    }

    .theme .shas {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px
    }

    .obs {
      display: flex;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border)
    }

    .obs:last-child {
      border-bottom: none
    }

    .obs .dot {
      color: var(--yellow)
    }

    table.grid {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px
    }

    table.grid th {
      text-align: left;
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border)
    }

    table.grid td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border)
    }

    table.grid td.num {
      text-align: right;
      font-family: var(--mono)
    }

    table.grid tr:hover td {
      background: var(--panel)
    }

    .repo-name {
      color: var(--blue);
      font-weight: 600
    }

    .commit {
      border-bottom: 1px solid var(--border);
      padding: 12px 0
    }

    .commit .sha {
      font-family: var(--mono);
      color: var(--yellow);
      font-size: 12px
    }

    .commit .meta {
      color: var(--muted);
      font-size: 12px;
      margin: 3px 0
    }

    .commit .msg {
      font-weight: 500
    }

    .commit .cstat {
      font-family: var(--mono);
      font-size: 12px;
      margin-top: 4px
    }

    .graph-wrap {
      overflow: auto;
      max-height: calc(100vh - 230px);
      border: 1px solid var(--border);
      border-radius: 8px
    }

    .graph-row {
      display: flex;
      align-items: center;
      height: 34px;
      font-size: 12px;
      padding-right: 10px;
      cursor: pointer
    }

    .graph-row:hover {
      background: var(--panel)
    }

    .graph-info {
      font-family: var(--mono);
      display: flex;
      gap: 8px;
      align-items: center;
      white-space: nowrap;
      overflow: hidden;
      flex: 1;
      min-width: 0
    }

    .graph-info .gsha {
      color: var(--yellow);
      flex-shrink: 0
    }

    .graph-info .gmsg {
      font-family: var(--sans);
      overflow: hidden;
      text-overflow: ellipsis
    }

    .gauthor {
      color: var(--muted);
      font-size: 11px;
      flex-shrink: 0;
      width: 130px;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .gdate {
      color: var(--muted);
      font-size: 11px;
      font-family: var(--mono);
      flex-shrink: 0;
      width: 110px;
      text-align: right
    }

    .commit-detail {
      background: var(--panel);
      position: relative;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border)
    }

    .cd-lanes {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      pointer-events: none
    }

    .cd-grid {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 6px 14px;
      align-items: start;
      padding: 12px 16px
    }

    .cd-k {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .4px
    }

    .cd-v {
      font-family: var(--sans);
      word-break: break-word
    }

    .cd-msg {
      white-space: pre-wrap;
      line-height: 1.55
    }

    .graph-row.is-head {
      background: rgba(247, 129, 102, 0.06)
    }

    .cd-v .gsha {
      font-family: var(--mono);
      color: var(--yellow)
    }

    .ref {
      font-family: var(--mono);
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 10px;
      flex-shrink: 0;
      font-weight: 600
    }

    .ref-local {
      color: #fff;
      background: var(--blue)
    }

    .ref-remote {
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border)
    }

    .ref-tag {
      color: #fff;
      background: var(--green)
    }

    .ref-head {
      outline: 2px solid var(--accent);
      outline-offset: 1px
    }

    .cost {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 16px
    }

    .err {
      color: var(--red);
      background: var(--panel);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 12px 14px
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .loading {
      color: var(--muted);
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 40px;
      justify-content: center
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50
    }

    .modal-bg.show {
      display: flex
    }

    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 600px;
      max-width: 90vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column
    }

    .modal-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .modal-head .cur {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .modal-body {
      overflow-y: auto;
      padding: 14px 18px;
      flex: 1
    }

    .modal-list {
      overflow-y: auto;
      padding: 8px;
      flex: 1
    }

    .dir-item {
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px
    }

    .dir-item:hover {
      background: var(--panel-2)
    }

    .dir-item .ico {
      color: var(--muted)
    }

    .dir-item.is-repo .ico {
      color: var(--accent)
    }

    .modal-foot {
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px
    }

    .drives {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border)
    }

    .drive {
      font-family: var(--mono);
      font-size: 12px;
      padding: 3px 8px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 5px;
      cursor: pointer
    }

    .drive:hover {
      border-color: var(--accent)
    }

    .prov-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px
    }

    .prov-card .ph {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px
    }

    .prov-card .ph .name {
      font-weight: 600;
      font-size: 15px
    }

    .prov-card .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--muted)
    }

    .prov-card .badge.cloud {
      color: var(--blue)
    }

    .prov-card .badge.local {
      color: var(--green)
    }

    .cm-box {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      background: var(--panel);
      margin-bottom: 12px
    }

    .cm-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px
    }

    .cm-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted)
    }

    .cm-subject {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      padding: 6px 0
    }

    .cm-bullets {
      margin: 6px 0 0 18px;
      line-height: 1.6
    }

    .cm-bullets li {
      margin-bottom: 3px
    }

    .cm-full {
      width: 100%;
      margin-top: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px;
      resize: vertical
    }

    .cm-files {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      background: var(--panel)
    }

    .cm-file {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
      font-size: 12px
    }

    .cm-st {
      font-family: var(--mono);
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      flex-shrink: 0;
      width: 64px;
      text-align: center
    }

    .cm-modified {
      background: var(--accent-dim);
      color: var(--accent)
    }

    .cm-added,
    .cm-untracked {
      background: rgba(63, 185, 80, .15);
      color: var(--green)
    }

    .cm-deleted {
      background: rgba(248, 81, 73, .15);
      color: var(--red)
    }

    .cm-renamed,
    .cm-copied,
    .cm-typechange {
      background: var(--panel-2);
      color: var(--muted)
    }

    .cm-path {
      font-family: var(--mono);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .cm-num {
      font-family: var(--mono);
      font-size: 11px;
      flex-shrink: 0
    }

    .changes-badge {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 2px 7px;
      border-radius: 10px;
      text-transform: none;
      letter-spacing: 0;
      cursor: default;
      white-space: nowrap
    }

    button.btn.sm {
      padding: 6px 10px;
      font-size: 12px;
      width: auto
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>git<span class="pulse">pulse</span></h1>
        <div class="brand-ctl">
          <select class="uilang" id="uiLangSel">
            <option value="en">EN</option>
            <option value="fr">FR</option>
          </select>
          <button class="mini" id="themeBtn" title="Theme">&#9680;</button>
        </div>
      </div>
      <div class="side-section">
        <h2 style="justify-content:space-between"><span data-i="repository">Repository</span><span id="changesBadge"
            class="changes-badge" style="display:none"></span></h2>
        <div class="source-tabs">
          <div class="source-tab active" data-src="local" data-i="local">Local</div>
          <div class="source-tab" data-src="url" data-i="remoteUrl">Remote URL</div>
        </div>
        <div class="field" id="localField">
          <div class="row">
            <input class="path" id="pathInput" data-i-ph="pastePath" placeholder="Paste path or browse">
            <button class="browse-btn" id="browseBtn" data-i="browse">Browse</button>
          </div>
        </div>
        <div class="field" id="urlField" style="display:none">
          <input class="path" id="urlInput" placeholder="https://... or git@...">
          <label style="display:flex;align-items:center;gap:6px;margin-top:7px;cursor:pointer;font-size:11px">
            <input type="checkbox" id="insecureChk" style="width:auto"> <span data-i="allowInsecure">Allow insecure SSL
              (expired/self-signed cert)</span>
          </label>
        </div>
      </div>
      <div class="side-section" style="flex:1">
        <h2 data-i="recentRepos">Recent repositories</h2>
        <ul class="repo-mem" id="repoMem"></ul>
      </div>
      <div class="side-section">
        <h2><span data-i="model">Model</span><button class="mini" id="provMgrBtn" data-i="manage">Manage</button></h2>
        <div id="provStatus"></div>
        <div class="field" style="margin-top:8px"><label data-i="provider">Provider</label><select
            id="providerSel"></select></div>
        <div class="field"><label data-i="modelName">Model</label><select id="modelSel">
            <option value="">(default)</option>
          </select></div>
        <div class="field"><label data-i="summaryLang">Summary language</label><select id="langSel"></select></div>
      </div>
    </aside>
    <main class="main">
      <nav class="actionbar" id="actionbar">
        <div class="action active" data-act="summary" data-i="summary">Summary</div>
        <div class="action" data-act="log" data-i="log">Log</div>
        <div class="action" data-act="graph" data-i="graph">Graph</div>
        <div class="action" data-act="compare" data-i="compare">Compare</div>
        <div class="action" data-act="standup" data-i="standup">Standup</div>
        <div class="action" data-act="commit" data-i="commitTab">Commit</div>
        <div class="action" data-act="dashboard" data-i="dashboard">Dashboard</div>
        <div class="action" data-act="tracked" data-i="tracked">Tracked</div>
      </nav>
      <div class="controls" id="controls"></div>
      <div class="output" id="output">
        <div class="placeholder" data-i="welcome">Pick a repository, choose an action, and run it.</div>
      </div>
    </main>
  </div>

  <!-- folder browser -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <div class="modal-head"><span class="cur" id="modalCur"></span><button class="mini"
          id="modalClose">&#10005;</button></div>
      <div class="drives" id="modalDrives"></div>
      <div class="modal-list" id="modalList"></div>
      <div class="modal-foot"><button class="btn ghost" id="modalUp" data-i="up">&#8593; Up</button><button class="btn"
          id="modalPick" data-i="useFolder">Use this folder</button></div>
    </div>
  </div>

  <!-- provider manager -->
  <div class="modal-bg" id="provBg">
    <div class="modal">
      <div class="modal-head"><span data-i="aiProviders">AI providers</span><button class="mini"
          id="provClose">&#10005;</button></div>
      <div class="modal-body" id="provBody"></div>
    </div>
  </div>

  <script>
    const $ = s => document.querySelector(s);
    const api = async (p, o) => { const r = await fetch(p, o); if (!r.ok) { const e = await r.json().catch(() => ({ detail: r.statusText })); throw new Error(e.detail || 'Error'); } return r.json(); };
    const post = (p, b) => api(p, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) });
    let state = { source: 'local', action: 'summary', providers: [], langs: {}, uiLang: 'en', latency: null };

    // ---------- i18n ----------
    const I18N = {
      en: {
        repository: 'Repository', local: 'Local', remoteUrl: 'Remote URL', browse: 'Browse', pastePath: 'Paste path or browse',
        recentRepos: 'Recent repositories', model: 'Model', manage: 'Manage', provider: 'Provider', modelName: 'Model', summaryLang: 'Summary language',
        summary: 'Summary', log: 'Log', graph: 'Graph', compare: 'Compare', standup: 'Standup', dashboard: 'Dashboard', tracked: 'Tracked',
        welcome: 'Pick a repository, choose an action, and run it.', up: 'Up', useFolder: 'Use this folder', aiProviders: 'AI providers',
        timeWindow: 'Time window', branch: 'Branch', current: '(current)', periodLen: 'Period length', priorPeriods: 'Prior periods',
        maxCommits: 'Max commits', aiHeadline: 'AI headline per repo', off: 'Off (fast, free)', on: 'On', run: 'Run', refresh: 'Refresh',
        noRepos: 'No repos yet', selectFirst: 'Select a local path or a remote URL first.', overview: 'Overview', themes: 'Themes',
        observations: 'Observations', commits: 'commits', files: 'files', activeDays: 'active days', noCommits: 'No commits in this window.',
        yesterday: 'Yesterday', today: 'Today', noWip: 'No work in progress detected.', continueBranch: 'Continue on branch',
        wip: 'Work in progress', otherBranches: 'Other active branches', addRemote: 'Add a remote', gitUrl: 'Git URL', label: 'Label (optional)',
        track: 'Track', remove: 'Remove', noTracked: 'No tracked repositories yet.', remoteActivity: 'Remote activity',
        noTrackedHint: 'No tracked remotes. Add repos in the Tracked tab.', apiKey: 'API key', save: 'Save', saved: 'Saved', notSet: 'not set',
        startOllama: 'Start Ollama', ollamaStarting: 'Starting Ollama...', custom: 'Custom...', loadingProviders: 'Checking providers...', ollamaNoModels: 'Server running, but no models pulled yet. Pull one:', loading: 'Loading...', loadMore: 'Load more', allCommits: 'All commits', commitCount: 'Commits to load', allBranches: 'All branches', selectRepoGraph: 'Select a repository to view its graph.', commitMessage: 'Commit message', changesScope: 'Changes', scopeAll: 'All (staged + unstaged)', scopeStaged: 'Staged only', generateMsg: 'Generate message', generatingMsg: 'Analyzing changes...', noChanges: 'No uncommitted changes.', subject: 'Subject', changes: 'Changes', copy: 'Copy', copied: 'Copied!', diffTruncated: 'diff truncated', commitTab: 'Commit', selectRepoCommit: 'Select a local repository to generate a commit message.', commitType: 'Type', typeAuto: 'Auto-detect', regenerate: 'Regenerate', uncommittedShort: 'uncommitted', uncommittedFull: 'Uncommitted changes', commitHint: 'You have uncommitted changes — generate a commit message.',
        metered: 'A metered/limited connection may apply data charges for cloud models.',
        highLatency: 'High latency to cloud APIs detected. Cloud runs risk timeouts and wasted tokens.',
        switchLocal: 'Switch to local', proceedAnyway: 'Use cloud anyway', loadBranches: 'Load remote branches', allowInsecure: 'Allow insecure SSL (expired/self-signed cert)',
        windows: { '7d': 'Last 7 days', '24h': 'Last 24 hours', '30d': 'Last 30 days', 'today': 'Today', 'yesterday': 'Yesterday', 'this-week': 'This week', 'last-week': 'Last week' }
      },
      fr: {
        repository: 'Dépôt', local: 'Local', remoteUrl: 'URL distante', browse: 'Parcourir', pastePath: 'Coller un chemin ou parcourir',
        recentRepos: 'Dépôts récents', model: 'Modèle', manage: 'Gérer', provider: 'Fournisseur', modelName: 'Modèle', summaryLang: 'Langue du résumé',
        summary: 'Résumé', log: 'Journal', graph: 'Graphe', compare: 'Comparer', standup: 'Point quotidien', dashboard: 'Tableau de bord', tracked: 'Suivis',
        welcome: 'Choisissez un dépôt, une action, puis lancez.', up: 'Remonter', useFolder: 'Utiliser ce dossier', aiProviders: 'Fournisseurs IA',
        timeWindow: 'Période', branch: 'Branche', current: '(courante)', periodLen: 'Durée de période', priorPeriods: 'Périodes précédentes',
        maxCommits: 'Commits max', aiHeadline: 'Titre IA par dépôt', off: 'Désactivé (rapide, gratuit)', on: 'Activé', run: 'Lancer', refresh: 'Actualiser',
        noRepos: 'Aucun dépôt', selectFirst: 'Sélectionnez d\'abord un chemin local ou une URL distante.', overview: 'Synthèse', themes: 'Thèmes',
        observations: 'Observations', commits: 'commits', files: 'fichiers', activeDays: 'jours actifs', noCommits: 'Aucun commit sur cette période.',
        yesterday: 'Hier', today: 'Aujourd\'hui', noWip: 'Aucun travail en cours détecté.', continueBranch: 'Continuer sur la branche',
        wip: 'Travail en cours', otherBranches: 'Autres branches actives', addRemote: 'Ajouter un dépôt distant', gitUrl: 'URL Git', label: 'Étiquette (optionnel)',
        track: 'Suivre', remove: 'Retirer', noTracked: 'Aucun dépôt suivi pour l\'instant.', remoteActivity: 'Activité distante',
        noTrackedHint: 'Aucun dépôt distant suivi. Ajoutez-en dans l\'onglet Suivis.', apiKey: 'Clé API', save: 'Enregistrer', saved: 'Enregistré', notSet: 'non définie',
        startOllama: 'Démarrer Ollama', ollamaStarting: 'Démarrage d\'Ollama...', custom: 'Personnalisé...', loadingProviders: 'Vérification des fournisseurs...', ollamaNoModels: 'Serveur démarré, mais aucun modèle installé. Installez-en un :', loading: 'Chargement...', loadMore: 'Charger plus', allCommits: 'Tous les commits', commitCount: 'Commits à charger', allBranches: 'Toutes les branches', selectRepoGraph: 'Sélectionnez un dépôt pour afficher son graphe.', commitMessage: 'Message de commit', changesScope: 'Changements', scopeAll: 'Tout (indexé + non indexé)', scopeStaged: 'Indexé uniquement', generateMsg: 'Générer le message', generatingMsg: 'Analyse des changements...', noChanges: 'Aucun changement non commité.', subject: 'Résumé', changes: 'Changements', copy: 'Copier', copied: 'Copié !', diffTruncated: 'diff tronqué', commitTab: 'Commit', selectRepoCommit: 'Sélectionnez un dépôt local pour générer un message de commit.', commitType: 'Type', typeAuto: 'Détection auto', regenerate: 'Régénérer', uncommittedShort: 'non commités', uncommittedFull: 'Changements non commités', commitHint: 'Vous avez des changements non commités — générez un message de commit.',
        metered: 'Une connexion limitée peut entraîner des frais de données pour les modèles cloud.',
        highLatency: 'Latence élevée vers les API cloud. Risque de coupures et de gaspillage de tokens.',
        switchLocal: 'Passer en local', proceedAnyway: 'Utiliser le cloud quand même', loadBranches: 'Charger les branches distantes', allowInsecure: 'Autoriser SSL non sécurisé (certificat expiré/auto-signé)',
        windows: { '7d': '7 derniers jours', '24h': '24 dernières heures', '30d': '30 derniers jours', 'today': 'Aujourd\'hui', 'yesterday': 'Hier', 'this-week': 'Cette semaine', 'last-week': 'Semaine dernière' }
      }
    };
    function t(k) { return (I18N[state.uiLang] && I18N[state.uiLang][k]) || I18N.en[k] || k; }
    function applyI18n() {
      document.querySelectorAll('[data-i]').forEach(el => { const k = el.dataset.i; el.textContent = t(k); });
      document.querySelectorAll('[data-i-ph]').forEach(el => { el.placeholder = t(el.dataset.iPh); });
      renderControls(); renderMem();
    }
    $('#uiLangSel').onchange = () => { state.uiLang = $('#uiLangSel').value; localStorage.setItem('gp-uilang', state.uiLang); applyI18n(); };

    function initTheme() { document.documentElement.dataset.theme = localStorage.getItem('gp-theme') || 'dark'; }
    $('#themeBtn').onclick = () => { const n = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'; document.documentElement.dataset.theme = n; localStorage.setItem('gp-theme', n); };

    // ---------- repo memory ----------
    function loadMem() { try { return JSON.parse(localStorage.getItem('gp-mem') || '[]'); } catch { return []; } }
    function saveMem(m) { localStorage.setItem('gp-mem', JSON.stringify(m.slice(0, 12))); }
    function rememberRepo(kind, value) { if (!value) return; let m = loadMem().filter(r => r.value !== value); m.unshift({ kind, value }); saveMem(m); renderMem(); }
    function renderMem() {
      const m = loadMem(), ul = $('#repoMem'); ul.innerHTML = '';
      if (!m.length) { ul.innerHTML = '<li style="cursor:default;opacity:.6">' + t('noRepos') + '</li>'; return; }
      m.forEach(r => {
        const li = document.createElement('li');
        const short = r.value.replace(/\.git$/, '').split(/[\/\\]/).pop() || r.value;
        li.innerHTML = '<span class="tag">' + (r.kind === 'url' ? 'URL' : 'DIR') + '</span><span class="nm" title="' + r.value + '">' + short + '</span><span class="x">&#10005;</span>';
        li.querySelector('.nm').onclick = () => { if (r.kind === 'url') { setSource('url'); $('#urlInput').value = r.value; } else { setSource('local'); $('#pathInput').value = r.value; } onRepoChanged(); };
        li.querySelector('.x').onclick = e => { e.stopPropagation(); saveMem(loadMem().filter(x => x.value !== r.value)); renderMem(); };
        ul.appendChild(li);
      });
    }
    function setSource(src) { state.source = src; document.querySelectorAll('.source-tab').forEach(t => t.classList.toggle('active', t.dataset.src === src)); $('#localField').style.display = src === 'local' ? '' : 'none'; $('#urlField').style.display = src === 'url' ? '' : 'none'; }
    document.querySelectorAll('.source-tab').forEach(tb => tb.onclick = () => { setSource(tb.dataset.src); onRepoChanged(); });
    function currentSource() { if (state.source === 'url') { const v = $('#urlInput').value.trim(); return v ? { url: v } : null; } const v = $('#pathInput').value.trim(); return v ? { path: v } : null; }
    function onRepoChanged() {
      loadBranches();
      updateChangesBadge();
      if (state.action === 'graph' && currentSource()) runGraph(false);
      if (state.action === 'commit' && currentSource()) runCommit();
    }
    // auto-trigger graph when the user finishes typing/pasting a repo
    $('#pathInput').addEventListener('change', onRepoChanged);
    $('#urlInput').addEventListener('change', onRepoChanged);

    // ---------- providers ----------
    async function loadProviders() {
      $('#provStatus').innerHTML = '<div class="prov-line"><span class="spinner" style="width:11px;height:11px"></span><span class="pd">' + t('loadingProviders') + '</span></div>';
      const provs = await api('/api/providers'); state.providers = provs;
      // sidebar status
      $('#provStatus').innerHTML = provs.map(p => {
        return '<div class="prov-line" title="' + p.detail + '"><span class="dot-s ' + (p.available ? 'on' : 'off') + '"></span><span class="pn">' + p.name + '</span><span class="pd">' + p.detail + '</span></div>';
      }).join('');
      // provider select
      const psel = $('#providerSel'); const prev = psel.value;
      psel.innerHTML = '<option value="auto">Auto</option>' +
        provs.map(p => '<option value="' + p.name + '" ' + (p.available ? '' : 'disabled') + '>' + p.name + (p.available ? '' : ' (' + p.detail + ')') + '</option>').join('') +
        '<option value="local">Local (no model)</option>';
      if (prev) psel.value = prev;
      psel.onchange = () => { updateModels(); maybeWarnCloud(); };
      updateModels();
    }
    function updateModels() {
      const prov = $('#providerSel').value, msel = $('#modelSel');
      if (prov === 'auto' || prov === 'local') { msel.innerHTML = '<option value="">(default)</option>'; return; }
      const p = state.providers.find(x => x.name === prov); const models = p ? p.models : [];
      msel.innerHTML = '<option value="">(default)</option>' + models.map(m => '<option value="' + m + '">' + m + '</option>').join('');
    }
    function modelArgs() { return { provider: $('#providerSel').value, model: $('#modelSel').value || null, lang: $('#langSel').value || null }; }
    function selectedIsCloud() { const p = state.providers.find(x => x.name === $('#providerSel').value); return p && p.kind === 'cloud'; }

    async function maybeWarnCloud() {
      // only relevant for cloud providers
      if (!selectedIsCloud() && $('#providerSel').value !== 'auto') return;
    }

    // provider manager modal
    $('#provMgrBtn').onclick = openProvMgr;
    $('#provClose').onclick = () => $('#provBg').classList.remove('show');
    $('#provBg').onclick = e => { if (e.target === $('#provBg')) $('#provBg').classList.remove('show'); };
    async function openProvMgr() {
      $('#provBg').classList.add('show');
      $('#provBody').innerHTML = '<div class="loading"><span class="spinner"></span> ' + t('loadingProviders') + '</div>';
      let provs, keys;
      try { provs = await api('/api/providers'); keys = await api('/api/keys'); }
      catch (e) { $('#provBody').innerHTML = '<div class="err">' + (e.message || e) + '</div>'; return; }
      let h = '';
      provs.forEach(p => {
        h += '<div class="prov-card"><div class="ph"><span class="dot-s ' + (p.available ? 'on' : 'off') + '"></span><span class="name">' + p.name + '</span><span class="badge ' + p.kind + '">' + p.kind + '</span><span class="pd" style="margin-left:auto;color:var(--muted);font-size:12px">' + p.detail + '</span></div>';
        if (p.kind === 'cloud') {
          const k = keys[p.name] || {};
          const hint = PROV_HINTS[p.name] || '';
          h += '<div class="row" style="margin-top:4px"><input type="password" id="key_' + p.name + '" placeholder="' + t('apiKey') + (k.set ? ' (' + k.masked + ')' : ' (' + t('notSet') + ')') + '"><button class="btn sm" onclick="saveKey(\'' + p.name + '\')">' + t('save') + '</button></div>';
          if (hint) h += '<div class="pd" style="color:var(--muted);font-size:11px;margin-top:5px">' + hint + '</div>';
        } else if (p.name === 'ollama') {
          const running = p.detail !== 'server not running' && p.detail !== 'not installed';
          if (!running) {
            h += '<button class="btn sm" id="startOllamaBtn" style="margin-top:4px">' + t('startOllama') + '</button>';
          } else if (!p.models.length) {
            h += '<div class="pd" style="color:var(--yellow);font-size:12px;margin-top:4px">' + t('ollamaNoModels') + '</div>';
            h += '<div class="pd" style="color:var(--muted);font-size:11px;font-family:var(--mono)">ollama pull qwen2.5-coder:7b</div>';
          } else {
            h += '<div class="pd" style="color:var(--muted);font-size:12px;margin-top:4px">' + p.models.join(', ') + '</div>';
          }
        }
        h += '</div>';
      });
      $('#provBody').innerHTML = h;
      const ob = $('#startOllamaBtn');
      if (ob) ob.onclick = async () => {
        ob.textContent = t('ollamaStarting'); ob.disabled = true;
        const r = await post('/api/ollama/start', {});
        if (r.started) { await loadProviders(); openProvMgr(); }
        else { ob.textContent = r.error || 'Failed'; setTimeout(() => { ob.textContent = t('startOllama'); ob.disabled = false; }, 3000); }
      };
    }
    async function saveKey(prov) {
      const v = $('#key_' + prov).value.trim(); if (!v) return;
      await post('/api/keys', { provider: prov, key: v });
      openProvMgr(); loadProviders();
    }

    // ---------- branches ----------
    let branchList = { local: [], remote: [], head: null, remote_url: null };
    async function loadBranches() {
      const src = currentSource(); if (!src) { fillBranches(); return; }
      try {
        const ins = document.getElementById('insecureChk'); const r = await post('/api/branches', src.path ? { path: src.path } : { url: src.url, include_remote: !!src.url, insecure: !!(ins && ins.checked) });
        branchList = r; fillBranches();
      } catch { fillBranches(); }
    }
    function fillBranches() {
      const sel = document.getElementById('ctlBranch'); if (!sel) return;
      const all = [...new Set([...(branchList.local || []), ...(branchList.remote || [])])];
      const cur = sel.value;
      // First option = "All branches" (empty value). The current branch is only
      // marked with ●, never auto-selected — the graph shows the whole DAG.
      const allLabel = state.action === 'graph' ? t('allBranches') : t('current');
      sel.innerHTML = '<option value="">' + allLabel + '</option>' + all.map(b => '<option value="' + b + '">' + b + (b === branchList.head ? ' ●' : '') + '</option>').join('');
      if (branchList.remote_url) sel.innerHTML += '<option value="" disabled>──</option><option value="__loadremote">' + t('loadBranches') + '</option>';
      if (cur) sel.value = cur;  // preserve an explicit user choice only
      sel.onchange = () => { if (sel.value === '__loadremote') { sel.value = ''; loadRemoteBranches(); } };
    }
    async function loadRemoteBranches() {
      const src = currentSource(); if (!src || !src.path) return;
      const r = await post('/api/branches', { path: src.path, include_remote: true }); branchList = r; fillBranches();
    }

    // ---------- config / langs ----------
    async function loadConfig() {
      const cfg = await api('/api/config'); state.langs = cfg.languages;
      $('#langSel').innerHTML = Object.entries(cfg.languages).map(([c, n]) => '<option value="' + c + '" ' + (c === cfg.lang ? 'selected' : '') + '>' + n + '</option>').join('');
    }

    // ---------- latency ----------
    async function checkLatency() {
      try { state.latency = await api('/api/latency'); } catch { state.latency = null; }
    }

    // ---------- actions ----------
    const ACTIONS = {
      summary: { when: 1, branch: 1, run: runSummary }, log: { when: 1, branch: 1, run: runLog },
      graph: { graphmode: 1, run: runGraph }, compare: { period: 1, periods: 1, branch: 1, run: runCompare },
      standup: { run: runStandup }, commit: { commitmode: 1, run: runCommit }, dashboard: { when: 1, summarize: 1, run: runDashboard }, tracked: { run: runTracked },
    };
    function setAction(a) { state.action = a; document.querySelectorAll('.action').forEach(x => x.classList.toggle('active', x.dataset.act === a)); renderControls(); }
    document.querySelectorAll('.action').forEach(a => a.onclick = () => setAction(a.dataset.act));
    const WINDOWS = ['7d', '24h', '30d', 'today', 'yesterday', 'this-week', 'last-week'];
    function renderControls() {
      const cfg = ACTIONS[state.action], c = $('#controls'); if (!c) return; c.innerHTML = '';
      const add = h => { const d = document.createElement('div'); d.innerHTML = h; c.appendChild(d.firstElementChild); };
      if (cfg.when) {
        const opts = WINDOWS.map(w => '<option value="' + w + '">' + (t('windows')[w] || w) + '</option>').join('');
        add('<div class="field"><label>' + t('timeWindow') + '</label><select id="ctlWhenSel">' + opts + '<option value="__custom">' + t('custom') + '</option></select></div>');
        add('<div class="field" id="ctlWhenCustomWrap" style="display:none"><label>&nbsp;</label><input id="ctlWhen" value="7d" placeholder="7d, 2026-06-10.."></div>');
      }
      if (cfg.period) add('<div class="field"><label>' + t('periodLen') + '</label><input id="ctlPeriod" value="7d"></div>');
      if (cfg.periods) add('<div class="field"><label>' + t('priorPeriods') + '</label><input id="ctlPeriods" type="number" value="4" min="1"></div>');
      if (cfg.branch) add('<div class="field"><label>' + t('branch') + '</label><select id="ctlBranch"><option value="">' + t('current') + '</option></select></div>');
      if (cfg.summarize) add('<div class="field"><label>' + t('aiHeadline') + '</label><select id="ctlSummarize"><option value="false">' + t('off') + '</option><option value="true">' + t('on') + '</option></select></div>');
      if (cfg.graphmode) {
        // graph auto-loads all branches; only a refresh control is shown
        add('<div class="field go"><label>&nbsp;</label><button class="btn ghost" id="refreshBtn">&#8635; ' + t('refresh') + '</button></div>');
        $('#refreshBtn').onclick = () => runGraph(true);
        // auto-run if a repo is already selected
        if (currentSource()) runGraph(false);
        else out.innerHTML = '<div class="placeholder">' + t('selectRepoGraph') + '</div>';
        return;
      }
      if (cfg.commitmode) {
        const types = ['', 'feat', 'fix', 'refactor', 'docs', 'style', 'test', 'chore', 'perf', 'build', 'ci'];
        add('<div class="field"><label>' + t('changesScope') + '</label><select id="cmScope"><option value="all">' + t('scopeAll') + '</option><option value="staged">' + t('scopeStaged') + '</option></select></div>');
        add('<div class="field"><label>' + t('commitType') + '</label><select id="cmType">' + types.map(x => '<option value="' + x + '">' + (x === '' ? t('typeAuto') : x) + '</option>').join('') + '</select></div>');
        add('<div class="field go"><label>&nbsp;</label><button class="btn" id="cmGenBtn">' + t('generateMsg') + '</button></div>');
        $('#cmScope').onchange = () => { if (currentSource()) runCommit(); };
        $('#cmGenBtn').onclick = () => runCommit();
        if (currentSource()) runCommit();
        else out.innerHTML = '<div class="placeholder">' + t('selectRepoCommit') + '</div>';
        return;
      }
      const lbl = state.action === 'tracked' ? t('refresh') : t('run');
      add('<div class="field go"><label>&nbsp;</label><button class="btn" id="runBtn">' + lbl + '</button></div>');

    function appendGraphRows(startIdx, endIdx) {

    }
    async function runDashboard() { const go = async () => { try { loading('...'); const sum = document.getElementById('ctlSummarize').value === 'true'; const d = await post('/api/dashboard', Object.assign({ when: whenValue(), summarize: sum }, modelArgs())); if (d.error) { out.innerHTML = '<div class="placeholder">' + t('noTrackedHint') + '</div>'; return; } const head = '<tr><th>' + t('repository') + '</th><th class="num">' + t('commits') + '</th><th class="num">+</th><th class="num">&minus;</th><th class="num">' + t('files') + '</th>' + (sum ? '<th>Headline</th>' : '') + '</tr>'; const rows = d.rows.map(r => '<tr><td class="repo-name">' + esc(r.name) + '</td><td class="num">' + r.commits + '</td><td class="num add">+' + r.additions + '</td><td class="num del">-' + r.deletions + '</td><td class="num">' + r.files + '</td>' + (sum ? '<td style="color:var(--muted)">' + esc(r.headline || '') + '</td>' : '') + '</tr>').join(''); const total = d.rows.reduce((s, r) => s + r.commits, 0); out.innerHTML = '<div class="block"><h3>' + t('remoteActivity') + ' &middot; ' + esc(d.range_label) + '</h3><table class="grid"><thead>' + head + '</thead><tbody>' + rows + '</tbody></table><div class="cost">' + d.rows.length + ' active &middot; ' + total + ' ' + t('commits') + (d.failed.length ? ' &middot; ' + d.failed.length + ' failed' : '') + '</div></div>'; } catch (e) { showErr(e); } }; const sum = document.getElementById('ctlSummarize').value === 'true'; if (sum) cloudGuard(go); else go(); }
    async function runTracked() { try { loading('...'); const items = await api('/api/tracked'); let add = '<div class="block"><h3>' + t('addRemote') + '</h3><div class="controls" style="padding:0;border:none;background:none"><div class="field" style="flex:2"><label>' + t('gitUrl') + '</label><input id="trackUrl" placeholder="https://... or git@..."></div><div class="field"><label>' + t('label') + '</label><input id="trackLabel"></div><div class="field go"><label>&nbsp;</label><button class="btn" id="trackBtn">' + t('track') + '</button></div></div></div>'; const rows = items.length ? items.map((it, i) => { const nm = it.label || it.url.replace(/\.git$/, '').split(/[\/:]/).pop(); return '<tr><td class="num" style="color:var(--muted)">' + (i + 1) + '</td><td class="repo-name">' + esc(nm) + '</td><td style="font-family:var(--mono);font-size:12px;color:var(--muted)">' + esc(it.url) + '</td><td class="num"><button class="browse-btn untrackBtn" data-url="' + esc(it.url) + '">' + t('remove') + '</button></td></tr>'; }).join('') : '<tr><td colspan="4" style="color:var(--muted);padding:14px">' + t('noTracked') + '</td></tr>'; out.innerHTML = add + '<div class="block"><h3>' + t('tracked') + ' (' + items.length + ')</h3><table class="grid"><tbody>' + rows + '</tbody></table></div>'; $('#trackBtn').onclick = async () => { const url = $('#trackUrl').value.trim(); if (!url) return; await post('/api/tracked', { url, label: $('#trackLabel').value.trim() || null }); runTracked(); }; document.querySelectorAll('.untrackBtn').forEach(b => b.onclick = async () => { await api('/api/tracked?needle=' + encodeURIComponent(b.dataset.url), { method: 'DELETE' }); runTracked(); }); } catch (e) { showErr(e); } }

    // folder browser
    let modalPath = null;
    async function openBrowser() { $('#modalBg').classList.add('show'); const drv = await api('/api/drives'); $('#modalDrives').innerHTML = drv.drives.map(d => '<span class="drive" data-p="' + d + '">' + d + '</span>').join(''); document.querySelectorAll('.drive').forEach(el => el.onclick = () => browseTo(el.dataset.p)); browseTo($('#pathInput').value.trim() || null); }
    async function browseTo(path) { const d = await api('/api/browse' + (path ? ('?path=' + encodeURIComponent(path)) : '')); modalPath = d.path; $('#modalCur').textContent = d.path + (d.is_repo ? '  ● git' : ''); $('#modalUp').onclick = () => d.parent && browseTo(d.parent); $('#modalList').innerHTML = d.error ? '<div class="err">' + d.error + '</div>' : (d.entries.length ? d.entries.map(e => '<div class="dir-item ' + (e.is_repo ? 'is-repo' : '') + '" data-p="' + esc(e.path) + '"><span class="ico">' + (e.is_repo ? '&#9670;' : '&#9656;') + '</span> ' + esc(e.name) + '</div>').join('') : '<div style="color:var(--muted);padding:14px">—</div>'); document.querySelectorAll('.dir-item').forEach(el => el.onclick = () => browseTo(el.dataset.p)); }
    $('#browseBtn').onclick = openBrowser;
    $('#modalClose').onclick = () => $('#modalBg').classList.remove('show');
    $('#modalBg').onclick = e => { if (e.target === $('#modalBg')) $('#modalBg').classList.remove('show'); };
    $('#modalPick').onclick = () => { $('#pathInput').value = modalPath; setSource('local'); $('#modalBg').classList.remove('show'); onRepoChanged(); };

    (async function () {
      state.uiLang = localStorage.getItem('gp-uilang') || 'en'; $('#uiLangSel').value = state.uiLang;
      initTheme();
      await loadProviders(); await loadConfig(); await checkLatency();
      setAction('summary'); applyI18n(); renderMem(); updateChangesBadge();
    })();
  </script>
</body>
